name: Test jaxfun

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration_scope:
    name: integration test scope
    runs-on: ubuntu-latest
    outputs:
      run_integration: ${{ steps.changed.outputs.run_integration }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect integration-relevant changes
        id: changed
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "run_integration=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- \
            src examples couette production tests pyproject.toml uv.lock \
            .github/workflows/pytest.yml; then
            echo "run_integration=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_integration=true" >> "$GITHUB_OUTPUT"
          fi

  quick:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fast tests
            command: uv run pytest -m "not slow and not integration and not examples and not pinn and not gpu and not spmd"

          - name: smoke tests
            command: uv run pytest -m smoke

    steps:
      - uses: actions/checkout@v6

      - name: Install uv with caching
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen --all-groups --extra io

      - name: Run tests
        run: ${{ matrix.command }}

  full:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: slow tests
            command: uv run pytest -m "slow and not examples and not spmd and not pinn and not gpu"

          - name: example tests
            command: uv run pytest -m "examples and not spmd and not gpu"

          - name: PINN tests
            command: uv run pytest -m "pinn and not gpu"

          - name: SPMD tests
            command: uv run pytest --num-devices=2 -m "spmd and not slow and not examples and not pinn and not gpu"

          - name: SPMD example tests
            command: uv run pytest --num-devices=2 -m "spmd and examples and not gpu"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv with caching
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen --all-groups --extra io

      - name: Run tests
        run: ${{ matrix.command }}

  integration:
    name: integration tests
    needs: integration_scope
    if: needs.integration_scope.outputs.run_integration == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv with caching
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen --all-groups --extra io

      - name: Install shenfun system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfftw3-dev libfftw3-mpi-dev libhdf5-openmpi-dev libopenmpi-dev

      - name: Checkout shenfun reference
        uses: actions/checkout@v6
        with:
          repository: spectralDNS/shenfun
          ref: 4.2.2
          path: .reference/shenfun

      - name: Install shenfun reference
        env:
          CC: mpicc
          HDF5_DIR: /usr/lib/x86_64-linux-gnu/hdf5/openmpi
          HDF5_MPI: "ON"
        run: |
          uv pip install "scipy<1.16" numba -e .reference/shenfun
          uv pip install --reinstall --no-binary h5py --no-deps "h5py==3.16.0"

      - name: Run tests
        env:
          SHENFUN_PYTHON: ${{ github.workspace }}/.venv/bin/python
          SHENFUN_SOURCE_ROOT: ${{ github.workspace }}/.reference/shenfun
        run: uv run --no-sync pytest -rs -m "integration and not slow and not spmd and not pinn and not examples and not gpu"
